name: Build JavaFX App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build jlink image (Linux)
        run: mvn clean javafx:jlink

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: target/app

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: mvn clean package

      - name: Build Windows exe (jpackage)
        run: |
          jpackage `
            --name AssessX `
            --input target `
            --main-jar AssessX-1.0-SNAPSHOT.jar `
            --main-class com.assessx.assessx.MainApplication `
            --type exe

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "*.exe"

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build jlink image (macOS)
        run: mvn clean javafx:jlink

      - name: Build macOS app (jpackage)
        run: |
          jpackage \
            --name AssessX \
            --input target \
            --main-jar AssessX-1.0-SNAPSHOT.jar \
            --main-class com.assessx.assessx.MainApplication \
            --type app-image

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: "*.app"
