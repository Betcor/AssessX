<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0d1117; }
        #editor {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            font-size: 13px;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #161b22; }
        ::-webkit-scrollbar-thumb { background: #3d444d; border-radius: 4px; }

        /* GitHub Dark override */
        .ace_editor { background: #0d1117 !important; color: #e6edf3 !important; }
        .ace_gutter { background: #161b22 !important; color: #484f58 !important; border-right: 1px solid #21262d !important; }
        .ace_gutter-active-line { background: #1c2128 !important; }
        .ace_active-line { background: #161b22 !important; }
        .ace_cursor { color: #e6edf3 !important; }
        .ace_selection { background: #264f78 !important; }
        .ace_string { color: #a5d6ff !important; }
        .ace_constant.ace_numeric { color: #79c0ff !important; }
        .ace_constant.ace_language { color: #ff7b72 !important; }
        .ace_variable { color: #79c0ff !important; }
        .ace_punctuation { color: #e6edf3 !important; }
        .ace_keyword { color: #ff7b72 !important; }
        .ace_marker-layer .ace_bracket { border: 1px solid #6e7681 !important; }
    </style>
</head>
<body>
<div id="editor"></div>
<script src="ace.min.js"></script>
<script>
    var editor = ace.edit("editor");
    editor.setTheme("ace/theme/tomorrow_night");
    editor.session.setMode("ace/mode/json");
    editor.setOptions({
        fontSize:        "13px",
        fontFamily:      "JetBrains Mono, Fira Code, Cascadia Code, monospace",
        tabSize:         2,
        useSoftTabs:     true,
        showPrintMargin: false
    });
    editor.renderer.setScrollMargin(8, 8, 0, 0);

    window.getValue = function() { return editor.getValue(); };
    window.setValue = function(val) { editor.setValue(val, -1); };
</script>
</body>
</html>
